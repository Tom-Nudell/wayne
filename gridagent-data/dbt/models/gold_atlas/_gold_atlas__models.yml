version: 2

models:
  - name: gold_atlas__infrastructure_features
    description: |
      Visualization-grade feature catalog. One row per physical thing.
      ``kind`` is open-set; current values include ``plant``, ``substation``,
      ``transmission_line``. ``properties`` is a JSON blob whose schema
      depends on ``kind`` (documented per-kind in the project README).
    columns:
      - name: feature_id
        tests: [not_null, unique]
      - name: kind
        tests:
          - not_null
          - accepted_values:
              values: ['plant', 'unit', 'substation', 'transmission_line',
                       'data_center', 'gas_pipeline', 'distribution_feeder']
      - name: sources
        tests: [not_null]
