name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    if: "!contains(github.event.head_commit.message, 'skip_ci')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            platform/tools/.venv
            platform/orchestrator/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install gridagent-tools (with pandapower extra)
        run: |
          uv venv --python 3.11 platform/tools/.venv
          uv pip install --python platform/tools/.venv/bin/python -e platform/tools --extra pandapower

      - name: Tools smoke test (list → query → create → N-1)
        run: platform/tools/.venv/bin/python _smoke_test.py

      - name: Install gridagent-orchestrator (with pydantic-ai)
        run: |
          uv venv --python 3.11 platform/orchestrator/.venv
          uv pip install --python platform/orchestrator/.venv/bin/python \
            -e platform/orchestrator \
            -e platform/tools \
            pandapower

      - name: Orchestrator smoke test (pydantic-ai FunctionModel)
        run: platform/orchestrator/.venv/bin/python _orchestrator_smoke.py

  data-tests:
    if: "!contains(github.event.head_commit.message, 'skip_ci')"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/data
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            platform/data/.venv
          key: uv-data-${{ runner.os }}-${{ hashFiles('platform/data/pyproject.toml') }}

      - name: Install gridagent-data (with dev)
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv/bin/python -e '.[dev]'

      - name: Pytest
        run: .venv/bin/pytest tests/ -v

  lint:
    if: "!contains(github.event.head_commit.message, 'skip_ci')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"

      - name: Ruff check
        run: |
          uv tool install ruff
          uvx ruff check \
            platform/tools/src \
            platform/orchestrator/src \
            platform/data/src \
            platform/data/tests

  schema-drift:
    # Source of truth: platform/data/.../schema/models.py
    # Target:          shared/schema/src/index.ts
    # If they disagree, the generator exits 2 with the regen command.
    if: "!contains(github.event.head_commit.message, 'skip_ci')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install pydantic
        run: uv pip install --system pydantic

      - name: Schema drift check
        run: |
          PYTHONPATH=platform/data/src python -m gridagent_data.schema.generate_ts \
            --out shared/schema/src/index.ts --check

  web:
    if: "!contains(github.event.head_commit.message, 'skip_ci')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Web typecheck
        run: pnpm --filter @wayne/web check

      - name: Tile-worker typecheck
        run: pnpm --filter @wayne/tile-worker check

      - name: Web build
        run: pnpm --filter @wayne/web build

      - name: JS bundle size gate
        run: pnpm --filter @wayne/web size

  # QA gate: runs all six checks against the RTS-GMLC test fixture bundle.
  # Visual regression returns 'warn' (not 'fail') in CI because there is no
  # approved baseline committed to the repo — baselines live on the data
  # engineer's machine and in R2 (Phase 2). The gate still fails the build
  # on any check that returns 'fail'.
  qa-gate:
    if: "!contains(github.event.head_commit.message, 'skip_ci')"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/data
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            platform/data/.venv
          key: uv-data-qa-${{ runner.os }}-${{ hashFiles('platform/data/pyproject.toml') }}

      - name: Install gridagent-data (with qa extra)
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv/bin/python -e '.[qa]'

      - name: Install Playwright browsers
        run: .venv/bin/playwright install chromium --with-deps

      - name: Build RTS-GMLC test fixture bundle
        run: |
          .venv/bin/python -m gridagent_data.cli ingest rts_gmlc
          .venv/bin/python -m gridagent_data.cli bundle \
            --warehouse "$GRIDAGENT_DATA_ROOT/warehouse.duckdb" \
            --out "$GRIDAGENT_DATA_ROOT/bundle/ci_fixture"
        env:
          GRIDAGENT_DATA_ROOT: /tmp/wayne_qa_data

      - name: Run QA gate against fixture bundle
        id: qa_gate
        run: |
          .venv/bin/gridagent-qa-gate \
            --bundle-dir /tmp/wayne_qa_data/bundle/ci_fixture/tiles \
            --json > /tmp/qa_report.json || true
          cat /tmp/qa_report.json
          # Fail the build only on 'fail' status (not 'warn' — visual regression
          # returns warn in CI because there is no approved baseline here).
          OVERALL=$(python3 -c "import json,sys; d=json.load(open('/tmp/qa_report.json')); sys.exit(0 if d['overall'] in ('pass','warn','skipped') else 1)")
        env:
          GRIDAGENT_DATA_ROOT: /tmp/wayne_qa_data

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-gate-report-${{ github.sha }}
          path: |
            /tmp/qa_report.json
            /tmp/wayne_qa_data/bundle/ci_fixture/tiles/pending_screenshots/
          retention-days: 14
