<!DOCTYPE html>
<!--
  Visual regression viewer for the Wayne QA gate.

  Usage (query params):
    tile_base   — base URL of the local tile server (e.g. http://localhost:8765)
    center      — JSON [lng, lat] (default: [-98.5, 39.5])
    zoom        — number (default: 4)
    layers      — comma-separated kind names (default: transmission_lines,plants,substations)

  The page sets data-ready="true" on <body> once the map has fired its
  first 'idle' event so Playwright knows it's safe to screenshot.
  Any map error sets data-error="<message>" instead.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1280px; height: 800px; overflow: hidden; background: #f3eee5; }
    #map { width: 100%; height: 100%; }
  </style>
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    crossorigin="anonymous"
  />
  <script
    src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"
    crossorigin="anonymous"
  ></script>
</head>
<body>
  <div id="map"></div>
  <script>
    var params = new URLSearchParams(location.search);
    var tileBase = params.get('tile_base') || 'http://localhost:8765';
    var center = JSON.parse(params.get('center') || '[-98.5,39.5]');
    var zoom = parseFloat(params.get('zoom') || '4');
    var layerNames = (params.get('layers') || 'transmission_lines,plants,substations,gas_pipelines').split(',');

    var protocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile);

    var sources = {};
    var mapLayers = [
      { id: 'background', type: 'background', paint: { 'background-color': '#f3eee5' } }
    ];

    // Line layers: transmission, gas
    var LINE_LAYERS = { transmission_lines: '#a8703f', gas_pipelines: '#6b5d4a' };
    // Point layers: plants, substations, ev_stations, data_centers, queue_projects
    var POINT_COLOR = '#b97a4d';

    for (var i = 0; i < layerNames.length; i++) {
      var name = layerNames[i].trim();
      if (!name) continue;
      sources[name] = {
        type: 'vector',
        url: 'pmtiles://' + tileBase + '/' + name + '.pmtiles'
      };
      if (LINE_LAYERS[name]) {
        mapLayers.push({
          id: 'wayne-' + name,
          type: 'line',
          source: name,
          'source-layer': name,
          paint: { 'line-color': LINE_LAYERS[name], 'line-width': 1.5, 'line-opacity': 0.85 }
        });
      } else {
        mapLayers.push({
          id: 'wayne-' + name,
          type: 'circle',
          source: name,
          'source-layer': name,
          paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 4, 2, 10, 5],
            'circle-color': POINT_COLOR,
            'circle-opacity': 0.9
          }
        });
      }
    }

    var map = new maplibregl.Map({
      container: 'map',
      style: { version: 8, sources: sources, layers: mapLayers },
      center: center,
      zoom: zoom,
      attributionControl: false,
      preserveDrawingBuffer: true  // required for screenshot fidelity
    });

    map.on('idle', function () {
      document.body.setAttribute('data-ready', 'true');
    });
    map.on('error', function (e) {
      document.body.setAttribute('data-error', (e.error && e.error.message) || 'unknown error');
    });
  </script>
</body>
</html>
